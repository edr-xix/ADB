name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Required to allow the pipeline to generate a Release page
permissions:
  contents: write

jobs:
  release-builds:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Execute PyInstaller Build
        run: |
          pyinstaller --clean --windowed --onefile --name="ADB" adb.py
        shell: bash

      - name: Compress OS-Specific Target
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Compress only the .app bundle, ignore the UNIX executable
            zip -r ../ADB-macOS.zip ADB.app
          elif [ "$RUNNER_OS" == "Windows" ]; then
            7z a ../ADB-Windows.zip ADB.exe
          else
            zip ../ADB-Linux.zip ADB
          fi

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          make_latest: true
          files: |
            *.zip
